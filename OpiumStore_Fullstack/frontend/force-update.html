<!doctype html>
<html lang="fr"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mise à jour OpiumStore</title><style>body{font-family:system-ui;background:#030712;color:white;display:grid;place-items:center;min-height:100vh;margin:0;text-align:center}.box{max-width:560px;padding:32px;border:1px solid #334155;border-radius:24px;background:#0f172a}a{color:#7dd3fc}</style></head><body><main class="box"><h1>Mise à jour OpiumStore</h1><p id="status">Suppression de l’ancien cache…</p></main><script>(async()=>{const status=document.getElementById("status");try{if("caches" in window){const keys=await caches.keys();await Promise.all(keys.map(k=>caches.delete(k)));}if("serviceWorker" in navigator){const regs=await navigator.serviceWorker.getRegistrations();await Promise.all(regs.map(r=>r.unregister()));}localStorage.setItem("opium_force_update_v75",Date.now().toString());status.textContent="Cache corrigé. Rechargement du site…";setTimeout(()=>location.replace("./?v=20260713-v75"),800);}catch(e){status.innerHTML="Impossible de vider automatiquement le cache. <a href="./?v=20260713-v75">Retourner au site</a>";}})();</script></body></html>
